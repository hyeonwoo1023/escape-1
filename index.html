<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>방탈출 게임</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#1d2b4f,#0b0f18 70%);
    min-height:100vh;
    color:white;
    font-family:'Pretendard',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.game-container{
    width:100%;
    max-width:1100px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    gap:20px;
}

.life-box,
.timer-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    padding:20px 30px;
    min-width:240px;
    box-shadow:0 0 25px rgba(0,140,255,0.2);
}

.life-title,
.timer-title{
    color:#00a2ff;
    font-weight:bold;
    margin-bottom:10px;
}

.hearts{

    display:grid;

    grid-template-columns:
    repeat(5, 22px);

    gap:6px;

    width:170px;

    font-size:22px;

    justify-items:center;

}

.stage-title{
    text-align:center;
    flex:1;
}

.stage-title h1{
    font-size:70px;
    color:#00a2ff;
    text-shadow:0 0 20px rgba(0,162,255,0.8);
}

.stage-title p{
    margin-top:10px;
    color:#ccc;
    font-size:20px;
}

.game-box{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:30px;
    padding:35px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.image-area{
    background:white;
    border-radius:20px;
    overflow:hidden;
    min-height:600px;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.image-area img{
    width:100%;
    max-width:850px;
    object-fit:contain;
}

.input-area{
    margin-top:30px;
    display:flex;
    gap:15px;
}

.input-area input{
    flex:1;
    padding:22px;
    font-size:22px;
    border:none;
    border-radius:18px;
    background:#121826;
    color:white;
    outline:none;
}

.input-area button{
    width:180px;
    border:none;
    border-radius:18px;
    background:#0077ff;
    color:white;
    font-size:24px;
    cursor:pointer;
    transition:0.2s;
}

.input-area button:hover{
    transform:scale(1.03);
    background:#2490ff;
}

.hint-btn{
    margin-top:25px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    color:white;
    font-size:20px;
    cursor:pointer;
}

.progress{
    display:flex;
    justify-content:space-between;
    margin-top:35px;
    gap:10px;
}

.stage-circle{
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.3);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    color:white;
    background:rgba(255,255,255,0.03);
}

.active{
    background:#0077ff;
    box-shadow:0 0 20px rgba(0,119,255,0.8);
}

.success-screen{
    text-align:center;
    padding:80px 20px;
}

.success-screen h1{
    font-size:80px;
    color:#00ff95;
}

.success-screen p{
    margin-top:20px;
    font-size:28px;
}

@media(max-width:900px){

    .top-bar{
        flex-direction:column;
    }

    .stage-title h1{
        font-size:50px;
    }

    .image-area{
        min-height:400px;
    }

    .input-area{
        flex-direction:column;
    }

    .input-area button{
        width:100%;
        height:70px;
    }

}

</style>
</head>

<body>

<div class="game-container">

    <div class="top-bar">

        <div class="life-box">
            <div class="life-title">LIFE</div>
            <div class="hearts" id="hearts"></div>
        </div>

        <div class="stage-title">
            <h1 id="stageTitle">STAGE 1</h1>
            <p>
                문제를 해결하고 다음 단계로 이동하세요!
            </p>
        </div>

        <div class="timer-box">
            <div class="timer-title">경과 시간</div>
            <div style="font-size:36px;" id="timer">
                00:00
            </div>
        </div>

    </div>

    <div class="game-box">

        <div class="image-area">
            <img id="questionImage" src="question1.jpg">
        </div>

        <div class="input-area">

            <input
                type="text"
                id="answer"
                placeholder="정답을 입력하세요">

            <button onclick="checkAnswer()">
                확인
            </button>

        </div>

        <button class="hint-btn" onclick="showHint()">
            💡 힌트 보기(3회 남음)
        </button>

        <div class="progress" id="progressBar">
        </div>

    </div>

</div>

<script>

const stages = [

{
    image:"question1.jpg",
    answer:"2400",
    hint:"가격의 규칙을 찾아보세요."
},

{
    image:"question2.jpg",
    answer:"사과",
    hint:"빨간 과일입니다."
},

{
    image:"question3.jpg",
    answer:"서울",
    hint:"대한민국 수도"
},

{
    image:"question4.jpg",
    answer:"지구",
    hint:"우리가 사는 행성"
},

{
    image:"question5.jpg",
    answer:"호랑이",
    hint:"백두산 근처에 삽니다."
},

{
    image:"question6.jpg",
    answer:"독도",
    hint:"대한민국 동쪽 섬"
}

];

let currentStage = 0;
let life = 10;
let seconds = 0;
let hintCount = 3;

const teacherPassword = "teacher123";
    
function loadStage(){

    document.getElementById("questionImage").src =
    stages[currentStage].image;

    document.getElementById("stageTitle").innerText =
    "STAGE " + (currentStage + 1);

    document.getElementById("answer").value = "";

    updateProgress();
}

function checkAnswer(){

    const userAnswer =
    document.getElementById("answer")
    .value
    .trim();

    if(
        userAnswer === stages[currentStage].answer
    ){

        currentStage++;

        if(currentStage >= stages.length){
            showSuccess();
        }

        else{
            loadStage();
        }

    }

    else{

        life--;

        updateHearts();

        alert("❌ 틀렸습니다!");

        if(life <= 0){
            gameOver();
        }

    }

}

function updateHearts(){

    let heartHTML = "";

    for(let i=0; i<10; i++){

        if(i < life){
            heartHTML += "<span>❤️</span>";
        }

        else{
            heartHTML += "<span>🖤</span>";
        }

    }

    document.getElementById("hearts")
    .innerHTML = heartHTML;

}

function showHint(){

    if(hintCount > 0){

        alert(
            "💡 힌트: "
            + stages[currentStage].hint
        );

        hintCount--;

        updateHintButton();

    }

    else{

        const inputPw =
        prompt(
            "힌트를 모두 사용했습니다.\n교사용 암호 입력:"
        );

        if(inputPw === teacherPassword){

            hintCount = 3;

            updateHintButton();

            alert(
                "힌트 사용 횟수가 초기화되었습니다!"
            );

        }

        else{

            alert("암호가 틀렸습니다.");

        }

    }

}

function updateHintButton(){

    document.querySelector(".hint-btn")
    .innerText =
    `💡 힌트 보기 (${hintCount}회 남음)`;

}
    
function updateProgress(){

    let html = "";

    for(let i=0; i<stages.length; i++){

        if(i === currentStage){
            html +=
            `<div class="stage-circle active">
                ${i+1}
            </div>`;
        }

        else{
            html +=
            `<div class="stage-circle">
                ${i+1}
            </div>`;
        }

    }

    document.getElementById("progressBar")
    .innerHTML = html;

}

function showSuccess(){

    document.querySelector(".game-box")
    .innerHTML = `

        <div class="success-screen">

            <h1>🎉 CLEAR 🎉</h1>

            <p>
                모든 스테이지를 완료했습니다!
            </p>

        </div>

    `;

}

function gameOver(){

    document.querySelector(".game-box")
    .innerHTML = `

        <div class="success-screen">

            <h1>💀 GAME OVER 💀</h1>

            <p>
                목숨을 모두 잃었습니다.
            </p>

        </div>

    `;

}

setInterval(()=>{

    seconds++;

    const min =
    String(Math.floor(seconds/60))
    .padStart(2,"0");

    const sec =
    String(seconds%60)
    .padStart(2,"0");

    document.getElementById("timer")
    .innerText =
    `${min}:${sec}`;

},1000);

loadStage();

updateHearts();

updateHintButton();
    
</script>

</body>
</html>
