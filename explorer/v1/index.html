<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Escape Engine v1.0</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <div class="game-container">

        <!-- ===============================
             상단 정보
        ================================ -->

        <header class="top-bar">

            <div id="lifeBox"></div>

            <div id="stageTitle">

                STAGE

            </div>

            <div id="timer">

                00:00

            </div>

        </header>



        <!-- ===============================
             게임 이미지
        ================================ -->

        <main id="imageContainer">

            <img
                id="gameImage"
                src=""
                alt="">

            <!-- Story일 때만 표시 -->
            <div id="nextGuide">

                👆 화면을 터치하여 계속

            </div>

        </main>



        <!-- ===============================
             문제 입력
        ================================ -->

        <section id="answerContainer">

            <input
                id="answerInput"
                type="text"
                placeholder="정답을 입력하세요."
                autocomplete="off">

            <button id="answerButton">

                확인

            </button>

        </section>



        <!-- ===============================
             힌트
        ================================ -->

        <section id="hintContainer">

            <button id="hintButton">

                💡 힌트

            </button>

        </section>



        <!-- ===============================
             진행도
        ================================ -->

        <section id="progressContainer">

            <div id="progressBar">

            </div>

        </section>

    </div>



    <!-- ===============================
         Game Over
    ================================ -->

    <div id="gameOverScreen" class="overlay">

        <div class="popup">

            <h1>GAME OVER</h1>

            <p>

                목숨을 모두 사용했습니다.

            </p>

            <button id="retryButton">

                다시 시작

            </button>

        </div>

    </div>



    <!-- ===============================
         Game Clear
    ================================ -->

    <div id="gameClearScreen" class="overlay">

        <div class="popup">

            <h1>🎉 GAME CLEAR 🎉</h1>

            <p>

                모든 스테이지를 완료했습니다.

            </p>

            <button id="homeButton">

                메인으로

            </button>

        </div>

    </div>



    <!-- ===============================
         제작자 모드
         (v1.1에서 활성화 예정)
    ================================ -->

    <div id="teacherPanel" class="overlay">

        <div class="popup">

            <h2>

                제작자 모드

            </h2>

            <div id="teacherInfo">

            </div>

            <button id="closeTeacher">

                닫기

            </button>

        </div>

    </div>



    <script src="script.js"></script>

</body>

</html>
