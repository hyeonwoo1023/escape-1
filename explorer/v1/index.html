<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>수학 방탈출</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="game-container">

    <!-- 상단 정보 -->

    <header class="top-bar">

        <div id="lifeBox"></div>

        <div id="stageTitle">

            STAGE 1

        </div>

        <div id="timer">

            00:00

        </div>

    </header>



    <!-- 이미지 -->

    <main id="imageContainer">

        <img
            id="gameImage"
            src=""
            alt="">

    </main>



    
    <!-- 정답 입력 -->

    <section id="answerContainer">

        <input
            id="answerInput"
            type="text"
            placeholder="정답을 입력하세요">

        <button id="answerButton">

            확인

        </button>

    </section>



    <!-- 힌트 -->

    <section>

        <button id="hintButton">

            💡 힌트

        </button>

    </section>



    <!-- 진행도 -->

    <footer id="progressBar">

    </footer>

</div>



<script src="script.js"></script>

</body>

</html>
